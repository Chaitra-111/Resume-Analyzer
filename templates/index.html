<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>📄 Resume Analyzer</h1>

    <form action="/analyze" method="POST" enctype="multipart/form-data">

        <select name="role" id="role" onchange="updateJD()" required>
            <option value="">Select Job Role</option>
            {% for role in roles %}
                <option value="{{ role }}">{{ role }}</option>
            {% endfor %}
        </select>

        <input type="file" name="resume" accept=".txt,.pdf" required>

        <textarea name="job_desc" id="job_desc" rows="5" placeholder="Job Description will appear here..." required></textarea>

        <button type="submit">Analyze Resume 🚀</button>
    </form>
</div>

<script>
    const roleDescriptions = {{ roles | tojson }};

    function updateJD() {
        const role = document.getElementById("role").value;
        document.getElementById("job_desc").value = roleDescriptions[role] || "";
    }
</script>

</body>
</html>
