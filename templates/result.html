<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>📊 Analysis Result</h1>

    <h2>Role: {{ role }}</h2>

    <div class="result-box">
        <h3>✅ Skills Found:</h3>
        <ul>
            {% for skill in skills %}
                <li>{{ skill }}</li>
            {% endfor %}
        </ul>
    </div>

    <div class="result-box">
        <h3>📈 Match Score: {{ score }}</h3>
        <h3>📊 Match Percentage: {{ percentage }}%</h3>
    </div>

    <div class="result-box">
        <h3>❌ Missing Skills:</h3>
        <ul>
            {% for m in missing %}
                <li>{{ m }}</li>
            {% endfor %}
        </ul>
    </div>

    <a href="/">⬅ Analyze Another Resume</a>
</div>

</body>
</html>
